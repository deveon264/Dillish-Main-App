<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florish Fitness — Screens</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'serif'],
                        sans: ['DM Sans', 'sans-serif'],
                    },
                    colors: {
                        blush: '#F4C5B8', rose: '#E8A898', petal: '#FFF8F6',
                        mauve: '#D4908A', cream: '#FDF9F7', charcoal: '#3A2820',
                        mist: '#F0E4DF', sand: '#EDD5C8', beige: '#F5EDE8',
                    },
                }
            }
        }
    </script>
    <style>
        body { background: #FDF9F7; }
        .frame-shadow { box-shadow: 0 20px 50px -20px rgba(58,40,32,0.35); }
    </style>
</head>
<body class="font-sans text-charcoal">
    <header class="px-6 md:px-12 pt-14 pb-10 max-w-6xl mx-auto">
        <div class="flex items-center gap-2 mb-6">
            <div class="w-8 h-8 rounded-full border border-mauve/40 flex items-center justify-center" style="background: rgba(244,197,184,0.2);">
                <span class="text-mauve text-sm">&#10047;</span>
            </div>
            <span class="font-serif text-2xl font-light tracking-[0.12em] text-charcoal">florish</span>
        </div>
        <p class="text-mauve text-xs font-light tracking-[0.25em] uppercase mb-3">Imported Prototype</p>
        <h1 class="font-serif font-light leading-tight mb-4" style="font-size: 44px;">Florish Fitness — <em class="italic text-mauve">all screens</em></h1>
        <p class="text-charcoal/60 font-light max-w-xl">A 12-screen mobile app prototype. Tap any screen to open it full-size, or browse the live previews below.</p>
    </header>

    <main class="px-6 md:px-12 pb-24 max-w-6xl mx-auto">
        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-12"></div>
    </main>

    <script>
        const screens = [
            ['01-welcome.html', 'Welcome'],
            ['02-create-account.html', 'Create Account'],
            ['03-fitness-goal.html', 'Fitness Goal'],
            ['04-profile-setup.html', 'Profile Setup'],
            ['05-water-goal.html', 'Water Goal'],
            ['06-subscription.html', 'Subscription'],
            ['07-dashboard.html', 'Dashboard'],
            ['08-workout-library.html', 'Workout Library'],
            ['09-workout-player.html', 'Workout Player'],
            ['10-ai-calorie-tracker.html', 'AI Calorie Tracker'],
            ['11-water-progress.html', 'Water & Progress'],
            ['12-profile-settings.html', 'Profile & Settings'],
        ];
        const grid = document.getElementById('grid');
        screens.forEach(([file, title], i) => {
            const href = 'screens/' + file;
            const card = document.createElement('div');
            card.className = 'flex flex-col items-center';
            card.innerHTML = `
                <a href="${href}" target="_blank" class="group block relative rounded-[28px] overflow-hidden frame-shadow bg-charcoal transition-transform duration-300 hover:-translate-y-1" style="width:280px;height:520px;">
                    <iframe src="${href}" loading="lazy" class="origin-top-left pointer-events-none" style="width:375px;height:696px;border:0;transform:scale(0.7467);"></iframe>
                    <div class="absolute inset-0 ring-1 ring-inset ring-black/10 rounded-[28px]"></div>
                    <div class="absolute inset-0 bg-charcoal/0 group-hover:bg-charcoal/10 transition-colors flex items-center justify-center">
                        <span class="opacity-0 group-hover:opacity-100 transition-opacity bg-petal/95 text-charcoal text-xs font-medium px-4 py-2 rounded-full tracking-wide">Open full screen &#8599;</span>
                    </div>
                </a>
                <div class="mt-4 text-center">
                    <span class="text-mauve/70 text-xs font-light tracking-widest">${String(i+1).padStart(2,'0')}</span>
                    <p class="font-serif text-lg font-light text-charcoal">${title}</p>
                </div>`;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
