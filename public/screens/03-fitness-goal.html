<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script> window.FontAwesomeConfig = { autoReplaceSvg: 'nest'};</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { display: none; }
        * { -webkit-tap-highlight-color: transparent; }
        .goal-card { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .goal-card:active { transform: scale(0.97); }
        .goal-card.selected { border-color: rgba(201,137,122,0.75); background: rgba(201,137,122,0.13); }
        .goal-card.selected .card-icon-wrap { background: rgba(201,137,122,0.22); }
        .goal-card.selected .card-check { opacity: 1; transform: scale(1); }
        .card-check { opacity: 0; transform: scale(0.7); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .cta-btn:active { transform: scale(0.97); }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'serif'],
                        sans: ['DM Sans', 'sans-serif'],
                    },
                    colors: {
                        blush: '#F2D4CC',
                        rose: '#C9897A',
                        petal: '#F7EBE8',
                        mauve: '#9B6E6A',
                        cream: '#FAF6F3',
                        charcoal: '#2C2422',
                        mist: '#E8DDD9',
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-charcoal font-sans flex justify-center items-start min-h-screen">

    <div id="goal-screen" class="relative w-full max-w-[375px] mx-auto overflow-hidden flex flex-col" style="height: 840px; background: linear-gradient(160deg, #2C2422 0%, #1e1614 60%, #2C2422 100%);">

        <div class="absolute inset-0 pointer-events-none" style="background: radial-gradient(ellipse at 80% 10%, rgba(242,212,204,0.07) 0%, transparent 55%), radial-gradient(ellipse at 10% 90%, rgba(201,137,122,0.05) 0%, transparent 50%);"></div>

        <div id="top-bar" class="relative z-20 flex items-center justify-between px-6 pt-12 pb-3">
            <div id="logo-mark" class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-full border border-blush/60 flex items-center justify-center">
                    <i class="fa-solid fa-leaf text-blush text-[10px]"></i>
                </div>
                <span class="font-serif text-petal text-lg font-light tracking-[0.12em]">florish</span>
            </div>
            <button id="skip-btn" class="text-petal/50 text-sm font-sans font-light tracking-widest uppercase py-2 px-1 min-h-[44px] flex items-center">
                Skip
            </button>
        </div>

        <div id="progress-indicator" class="relative z-20 flex items-center justify-center gap-[6px] px-6 mb-6">
            <div class="h-[2px] flex-1 rounded-full bg-petal/30"></div>
            <div class="h-[2px] flex-1 rounded-full bg-petal/30"></div>
            <div class="h-[2px] flex-1 rounded-full bg-petal/90"></div>
            <div class="h-[2px] flex-1 rounded-full bg-petal/25"></div>
            <div class="h-[2px] flex-1 rounded-full bg-petal/25"></div>
            <div class="h-[2px] flex-1 rounded-full bg-petal/25"></div>
        </div>

        <div id="main-content" class="relative z-10 flex flex-col flex-1 px-6 overflow-y-auto pb-2">

            <div id="header-block" class="mb-6">
                <p class="text-blush/70 text-[11px] font-sans font-light tracking-[0.28em] uppercase mb-2">Step 3 of 6</p>
                <h2 class="font-serif text-petal font-light leading-tight mb-1.5" style="font-size: 32px;">
                    What's your<br/><em class="italic text-blush font-light">main goal?</em>
                </h2>
                <p class="text-petal/45 text-[13px] font-sans font-light leading-relaxed">Choose one or more goals to personalise your experience.</p>
            </div>

            <div id="goals-grid" class="flex flex-col gap-3">

                <button id="goal-fat-loss" class="goal-card w-full min-h-[74px] rounded-2xl border border-petal/12 flex items-center gap-4 px-4 text-left" style="background: rgba(247,235,232,0.05);" onclick="toggleGoal(this)">
                    <div class="card-icon-wrap w-11 h-11 min-w-[44px] rounded-xl flex items-center justify-center" style="background: rgba(247,235,232,0.07);">
                        <i class="fa-solid fa-fire-flame-curved text-blush text-base"></i>
                    </div>
                    <div class="flex flex-col flex-1">
                        <span class="text-petal text-[15px] font-sans font-medium tracking-wide leading-snug">Fat Loss</span>
                        <span class="text-petal/40 text-[12px] font-sans font-light leading-snug mt-0.5">Burn calories & shed body fat</span>
                    </div>
                    <div class="card-check w-6 h-6 rounded-full flex items-center justify-center" style="background: rgba(201,137,122,0.85);">
                        <i class="fa-solid fa-check text-charcoal text-[10px]"></i>
                    </div>
                </button>

                <button id="goal-strength" class="goal-card w-full min-h-[74px] rounded-2xl border border-petal/12 flex items-center gap-4 px-4 text-left" style="background: rgba(247,235,232,0.05);" onclick="toggleGoal(this)">
                    <div class="card-icon-wrap w-11 h-11 min-w-[44px] rounded-xl flex items-center justify-center" style="background: rgba(247,235,232,0.07);">
                        <i class="fa-solid fa-dumbbell text-blush text-base"></i>
                    </div>
                    <div class="flex flex-col flex-1">
                        <span class="text-petal text-[15px] font-sans font-medium tracking-wide leading-snug">Build Strength</span>
                        <span class="text-petal/40 text-[12px] font-sans font-light leading-snug mt-0.5">Get stronger with resistance training</span>
                    </div>
                    <div class="card-check w-6 h-6 rounded-full flex items-center justify-center" style="background: rgba(201,137,122,0.85);">
                        <i class="fa-solid fa-check text-charcoal text-[10px]"></i>
                    </div>
                </button>

                <button id="goal-toning" class="goal-card w-full min-h-[74px] rounded-2xl border border-petal/12 flex items-center gap-4 px-4 text-left" style="background: rgba(247,235,232,0.05);" onclick="toggleGoal(this)">
                    <div class="card-icon-wrap w-11 h-11 min-w-[44px] rounded-xl flex items-center justify-center" style="background: rgba(247,235,232,0.07);">
                        <i class="fa-solid fa-person-running text-blush text-base"></i>
                    </div>
                    <div class="flex flex-col flex-1">
                        <span class="text-petal text-[15px] font-sans font-medium tracking-wide leading-snug">Toning & Sculpting</span>
                        <span class="text-petal/40 text-[12px] font-sans font-light leading-snug mt-0.5">Define & shape your body</span>
                    </div>
                    <div class="card-check w-6 h-6 rounded-full flex items-center justify-center" style="background: rgba(201,137,122,0.85);">
                        <i class="fa-solid fa-check text-charcoal text-[10px]"></i>
                    </div>
                </button>

                <button id="goal-wellness" class="goal-card w-full min-h-[74px] rounded-2xl border border-petal/12 flex items-center gap-4 px-4 text-left" style="background: rgba(247,235,232,0.05);" onclick="toggleGoal(this)">
                    <div class="card-icon-wrap w-11 h-11 min-w-[44px] rounded-xl flex items-center justify-center" style="background: rgba(247,235,232,0.07);">
                        <i class="fa-solid fa-heart-pulse text-blush text-base"></i>
                    </div>
                    <div class="flex flex-col flex-1">
                        <span class="text-petal text-[15px] font-sans font-medium tracking-wide leading-snug">Overall Wellness</span>
                        <span class="text-petal/40 text-[12px] font-sans font-light leading-snug mt-0.5">Boost energy, mood & health</span>
                    </div>
                    <div class="card-check w-6 h-6 rounded-full flex items-center justify-center" style="background: rgba(201,137,122,0.85);">
                        <i class="fa-solid fa-check text-charcoal text-[10px]"></i>
                    </div>
                </button>

                <button id="goal-habits" class="goal-card w-full min-h-[74px] rounded-2xl border border-petal/12 flex items-center gap-4 px-4 text-left" style="background: rgba(247,235,232,0.05);" onclick="toggleGoal(this)">
                    <div class="card-icon-wrap w-11 h-11 min-w-[44px] rounded-xl flex items-center justify-center" style="background: rgba(247,235,232,0.07);">
                        <i class="fa-solid fa-seedling text-blush text-base"></i>
                    </div>
                    <div class="flex flex-col flex-1">
                        <span class="text-petal text-[15px] font-sans font-medium tracking-wide leading-snug">Habit Building</span>
                        <span class="text-petal/40 text-[12px] font-sans font-light leading-snug mt-0.5">Create lasting healthy routines</span>
                    </div>
                    <div class="card-check w-6 h-6 rounded-full flex items-center justify-center" style="background: rgba(201,137,122,0.85);">
                        <i class="fa-solid fa-check text-charcoal text-[10px]"></i>
                    </div>
                </button>

            </div>

            <div id="selection-hint" class="flex items-center justify-center gap-2 mt-4 mb-1">
                <div class="h-px flex-1 bg-petal/10"></div>
                <span id="hint-text" class="text-petal/30 text-[11px] font-sans font-light tracking-widest uppercase">Select all that apply</span>
                <div class="h-px flex-1 bg-petal/10"></div>
            </div>

        </div>

        <div id="bottom-actions" class="relative z-20 px-6 pb-10 pt-2" style="background: linear-gradient(to top, #1e1614 70%, transparent 100%);">
            <div class="flex items-center gap-3">
                <button id="back-btn" class="min-w-[54px] min-h-[54px] rounded-2xl border border-petal/15 bg-white/5 flex items-center justify-center transition-all active:scale-95">
                    <i class="fa-solid fa-arrow-left text-petal/60 text-sm"></i>
                </button>
                <button id="next-btn" class="cta-btn flex-1 min-h-[54px] rounded-2xl flex items-center justify-center gap-3 font-sans font-medium tracking-wide text-charcoal text-[15px] transition-all" style="background: linear-gradient(135deg, #F2D4CC 0%, #C9897A 100%);">
                    <span>Continue</span>
                    <i class="fa-solid fa-arrow-right text-charcoal/80 text-sm"></i>
                </button>
            </div>
        </div>

    </div>

    <script>
        const selectedGoals = new Set();

        function toggleGoal(card) {
            const id = card.id;
            if (selectedGoals.has(id)) {
                selectedGoals.delete(id);
                card.classList.remove('selected');
            } else {
                selectedGoals.add(id);
                card.classList.add('selected');
            }
            updateHint();
        }

        function updateHint() {
            const hint = document.getElementById('hint-text');
            const count = selectedGoals.size;
            if (count === 0) {
                hint.textContent = 'Select all that apply';
            } else if (count === 1) {
                hint.textContent = '1 goal selected';
                hint.style.color = 'rgba(242,212,204,0.6)';
            } else {
                hint.textContent = count + ' goals selected';
                hint.style.color = 'rgba(242,212,204,0.6)';
            }
        }
    </script>

</body>
</html>
