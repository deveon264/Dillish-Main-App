<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script> window.FontAwesomeConfig = { autoReplaceSvg: 'nest'};</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { display: none; }
        * { -webkit-tap-highlight-color: transparent; }
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0px 1000px rgba(242,212,204,0.08) inset;
            -webkit-text-fill-color: #FAF6F3;
            transition: background-color 5000s ease-in-out 0s;
        }
        input::placeholder { color: rgba(247,235,232,0.35); }
        .input-focus-ring:focus { outline: none; border-color: rgba(201,137,122,0.7); box-shadow: 0 0 0 3px rgba(201,137,122,0.12); }
        .social-btn { transition: background 0.2s, transform 0.15s; }
        .social-btn:active { transform: scale(0.97); }
        .cta-btn:active { transform: scale(0.97); }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'serif'],
                        sans: ['DM Sans', 'sans-serif'],
                    },
                    colors: {
                        blush: '#F2D4CC',
                        rose: '#C9897A',
                        petal: '#F7EBE8',
                        mauve: '#9B6E6A',
                        cream: '#FAF6F3',
                        charcoal: '#2C2422',
                        mist: '#E8DDD9',
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-charcoal font-sans flex justify-center items-start min-h-screen">

    <div id="signup-screen" class="relative w-full max-w-[375px] mx-auto overflow-hidden flex flex-col" style="height: 840px; background: linear-gradient(160deg, #2C2422 0%, #1e1614 60%, #2C2422 100%);">

        <div class="absolute inset-0 pointer-events-none" style="background: radial-gradient(ellipse at 80% 10%, rgba(242,212,204,0.07) 0%, transparent 55%), radial-gradient(ellipse at 10% 90%, rgba(201,137,122,0.05) 0%, transparent 50%);"></div>

        <div id="top-bar" class="relative z-20 flex items-center justify-between px-6 pt-12 pb-3">
            <div id="logo-mark" class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-full border border-blush/60 flex items-center justify-center">
                    <i class="fa-solid fa-leaf text-blush text-[10px]"></i>
                </div>
                <span class="font-serif text-petal text-lg font-light tracking-[0.12em]">florish</span>
            </div>
            <button id="skip-btn" class="text-petal/50 text-sm font-sans font-light tracking-widest uppercase py-2 px-1 min-h-[44px] flex items-center">
                Skip
            </button>
        </div>

        <div id="progress-indicator" class="relative z-20 flex items-center justify-center gap-[6px] px-6 mb-6">
            <div class="h-[2px] flex-1 rounded-full bg-petal/30"></div>
            <div class="h-[2px] flex-1 rounded-full bg-petal/90"></div>
            <div class="h-[2px] flex-1 rounded-full bg-petal/25"></div>
            <div class="h-[2px] flex-1 rounded-full bg-petal/25"></div>
            <div class="h-[2px] flex-1 rounded-full bg-petal/25"></div>
            <div class="h-[2px] flex-1 rounded-full bg-petal/25"></div>
        </div>

        <div id="main-content" class="relative z-10 flex flex-col flex-1 px-6 overflow-y-auto">

            <div id="header-block" class="mb-7">
                <p class="text-blush/70 text-[11px] font-sans font-light tracking-[0.28em] uppercase mb-2">Step 2 of 6</p>
                <h2 class="font-serif text-petal font-light leading-tight mb-1.5" style="font-size: 32px;">
                    Create your<br/><em class="italic text-blush font-light">account</em>
                </h2>
                <p class="text-petal/45 text-[13px] font-sans font-light leading-relaxed">Join thousands of women transforming their wellness journey.</p>
            </div>

            <div id="social-signin-section" class="flex flex-col gap-3 mb-6">
                <button id="google-btn" class="social-btn w-full min-h-[50px] rounded-2xl border border-petal/12 bg-white/5 backdrop-blur-sm flex items-center justify-center gap-3 text-petal/80 text-[14px] font-sans font-light tracking-wide">
                    <i class="fa-brands fa-google text-blush text-base"></i>
                    <span>Continue with Google</span>
                </button>
                <button id="apple-btn" class="social-btn w-full min-h-[50px] rounded-2xl border border-petal/12 bg-white/5 backdrop-blur-sm flex items-center justify-center gap-3 text-petal/80 text-[14px] font-sans font-light tracking-wide">
                    <i class="fa-brands fa-apple text-petal text-base"></i>
                    <span>Continue with Apple</span>
                </button>
            </div>

            <div id="divider" class="flex items-center gap-3 mb-6">
                <div class="flex-1 h-px bg-petal/12"></div>
                <span class="text-petal/35 text-[12px] font-sans font-light tracking-widest uppercase">or</span>
                <div class="flex-1 h-px bg-petal/12"></div>
            </div>

            <div id="form-section" class="flex flex-col gap-4 mb-6">

                <div id="name-field" class="flex flex-col gap-1.5">
                    <label class="text-petal/55 text-[11px] font-sans font-light tracking-[0.2em] uppercase">Full Name</label>
                    <div class="relative">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none">
                            <i class="fa-regular fa-user text-blush/50 text-sm"></i>
                        </div>
                        <input
                            id="input-name"
                            type="text"
                            placeholder="Your full name"
                            class="input-focus-ring w-full min-h-[54px] rounded-2xl border border-petal/12 bg-white/5 pl-11 pr-4 text-petal text-[14px] font-sans font-light tracking-wide transition-all"
                            style="background: rgba(247,235,232,0.05);"
                        />
                    </div>
                </div>

                <div id="email-field" class="flex flex-col gap-1.5">
                    <label class="text-petal/55 text-[11px] font-sans font-light tracking-[0.2em] uppercase">Email Address</label>
                    <div class="relative">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none">
                            <i class="fa-regular fa-envelope text-blush/50 text-sm"></i>
                        </div>
                        <input
                            id="input-email"
                            type="email"
                            placeholder="hello@example.com"
                            class="input-focus-ring w-full min-h-[54px] rounded-2xl border border-petal/12 bg-white/5 pl-11 pr-4 text-petal text-[14px] font-sans font-light tracking-wide transition-all"
                            style="background: rgba(247,235,232,0.05);"
                        />
                    </div>
                </div>

                <div id="password-field" class="flex flex-col gap-1.5">
                    <label class="text-petal/55 text-[11px] font-sans font-light tracking-[0.2em] uppercase">Password</label>
                    <div class="relative">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none">
                            <i class="fa-regular fa-lock text-blush/50 text-sm"></i>
                        </div>
                        <input
                            id="input-password"
                            type="password"
                            placeholder="Min. 8 characters"
                            class="input-focus-ring w-full min-h-[54px] rounded-2xl border border-petal/12 bg-white/5 pl-11 pr-12 text-petal text-[14px] font-sans font-light tracking-wide transition-all"
                            style="background: rgba(247,235,232,0.05);"
                        />
                        <button id="toggle-password" class="absolute right-4 top-1/2 -translate-y-1/2 min-w-[44px] min-h-[44px] flex items-center justify-center">
                            <i id="eye-icon" class="fa-regular fa-eye text-petal/30 text-sm"></i>
                        </button>
                    </div>
                    <div id="password-strength" class="flex gap-1 mt-1">
                        <div class="h-[3px] flex-1 rounded-full bg-petal/15"></div>
                        <div class="h-[3px] flex-1 rounded-full bg-petal/15"></div>
                        <div class="h-[3px] flex-1 rounded-full bg-petal/15"></div>
                        <div class="h-[3px] flex-1 rounded-full bg-petal/15"></div>
                    </div>
                </div>

            </div>

            <div id="terms-row" class="flex items-start gap-3 mb-7">
                <button id="terms-checkbox" class="w-5 h-5 min-w-[20px] rounded-md border border-petal/25 bg-white/5 flex items-center justify-center mt-0.5 transition-all" onclick="toggleCheckbox()">
                    <i id="check-icon" class="fa-solid fa-check text-[10px] text-blush hidden"></i>
                </button>
                <p class="text-petal/40 text-[12px] font-sans font-light leading-relaxed">
                    I agree to the <span class="text-blush/80 underline underline-offset-2">Terms of Service</span> and <span class="text-blush/80 underline underline-offset-2">Privacy Policy</span>
                </p>
            </div>

        </div>

        <div id="bottom-actions" class="relative z-20 px-6 pb-10 pt-2" style="background: linear-gradient(to top, #1e1614 70%, transparent 100%);">
            <div class="flex items-center gap-3">
                <button id="back-btn" class="min-w-[54px] min-h-[54px] rounded-2xl border border-petal/15 bg-white/5 flex items-center justify-center transition-all active:scale-95">
                    <i class="fa-solid fa-arrow-left text-petal/60 text-sm"></i>
                </button>
                <button id="next-btn" class="cta-btn flex-1 min-h-[54px] rounded-2xl flex items-center justify-center gap-3 font-sans font-medium tracking-wide text-charcoal text-[15px] transition-all" style="background: linear-gradient(135deg, #F2D4CC 0%, #C9897A 100%);">
                    <span>Continue</span>
                    <i class="fa-solid fa-arrow-right text-charcoal/80 text-sm"></i>
                </button>
            </div>

            <p class="text-center text-petal/35 text-[12px] font-sans font-light mt-5">
                Already a member? <span class="text-blush/80 font-medium">Sign in</span>
            </p>
        </div>

    </div>

    <script>
        function toggleCheckbox() {
            const icon = document.getElementById('check-icon');
            const btn = document.getElementById('terms-checkbox');
            if (icon.classList.contains('hidden')) {
                icon.classList.remove('hidden');
                btn.style.borderColor = 'rgba(201,137,122,0.7)';
                btn.style.background = 'rgba(201,137,122,0.15)';
            } else {
                icon.classList.add('hidden');
                btn.style.borderColor = '';
                btn.style.background = '';
            }
        }

        const toggleBtn = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('input-password');
        const eyeIcon = document.getElementById('eye-icon');

        toggleBtn.addEventListener('click', function() {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
                eyeIcon.style.color = 'rgba(201,137,122,0.7)';
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
                eyeIcon.style.color = '';
            }
        });

        const strengthBars = document.querySelectorAll('#password-strength div');
        const strengthColors = [
            'rgba(201,137,122,0.4)',
            'rgba(201,137,122,0.6)',
            'rgba(201,137,122,0.8)',
            'rgba(201,137,122,1)',
        ];

        passwordInput.addEventListener('input', function() {
            const val = passwordInput.value;
            let strength = 0;
            if (val.length >= 8) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;

            strengthBars.forEach((bar, i) => {
                if (i < strength) {
                    bar.style.background = strengthColors[Math.min(strength - 1, 3)];
                } else {
                    bar.style.background = 'rgba(247,235,232,0.15)';
                }
            });
        });
    </script>

</body>
</html>
