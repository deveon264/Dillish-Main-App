<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script> window.FontAwesomeConfig = { autoReplaceSvg: 'nest'};</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { display: none; }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'serif'],
                        sans: ['DM Sans', 'sans-serif'],
                    },
                    colors: {
                        blush: '#F4C5B8',
                        rose: '#E8A898',
                        petal: '#FFF8F6',
                        mauve: '#D4908A',
                        cream: '#FDF9F7',
                        charcoal: '#3A2820',
                        mist: '#F0E4DF',
                        sand: '#EDD5C8',
                        beige: '#F5EDE8',
                    },
                    backgroundImage: {
                        'gradient-overlay': 'linear-gradient(to top, rgba(58,40,32,0.92) 0%, rgba(58,40,32,0.55) 45%, rgba(58,40,32,0.1) 75%, transparent 100%)',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-charcoal font-sans flex justify-center items-start min-h-screen">

    <div id="welcome-screen" class="relative w-full max-w-[375px] mx-auto overflow-hidden" style="height: 840px;">

        <div id="hero-image-container" class="absolute inset-0 w-full h-full">
            <img
                class="w-full h-full object-cover object-top"
                src="https://storage.googleapis.com/uxpilot-auth.appspot.com/325d4f9949-5c9d1c23e7c96fc89eb5.png" alt="beautiful confident athletic woman Dillish, fitness ambassador, soft natural light, warm tones, premium lifestyle photography, feminine strength, looking slightly off camera, elegant minimal background" />
            <div class="absolute inset-0 bg-gradient-overlay" style="background: linear-gradient(to top, rgba(44,36,34,0.96) 0%, rgba(44,36,34,0.65) 38%, rgba(44,36,34,0.15) 65%, transparent 100%);"></div>
            <div class="absolute inset-0" style="background: linear-gradient(to bottom, rgba(44,36,34,0.45) 0%, transparent 20%);"></div>
        </div>

        <div id="top-bar" class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between px-6 pt-12 pb-4">
            <div id="logo-mark" class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-full border border-blush/70 flex items-center justify-center" style="background: rgba(244,197,184,0.15);">
                    <i class="fa-solid fa-leaf text-blush text-[10px]"></i>
                </div>
                <span class="font-serif text-petal text-lg font-light tracking-[0.12em]">florish</span>
            </div>
            <button id="skip-btn" class="text-petal/70 text-sm font-sans font-light tracking-widest uppercase py-2 px-1 min-h-[44px] flex items-center">
                Skip
            </button>
        </div>

        <div id="progress-indicator" class="absolute top-[72px] left-0 right-0 z-20 flex items-center justify-center gap-[6px] px-6">
            <div class="h-[2px] flex-1 rounded-full bg-blush"></div>
            <div class="h-[2px] flex-1 rounded-full bg-petal/25"></div>
            <div class="h-[2px] flex-1 rounded-full bg-petal/25"></div>
            <div class="h-[2px] flex-1 rounded-full bg-petal/25"></div>
            <div class="h-[2px] flex-1 rounded-full bg-petal/25"></div>
            <div class="h-[2px] flex-1 rounded-full bg-petal/25"></div>
        </div>

        <div id="ambassador-tag" class="absolute z-20" style="top: 260px; left: 24px;">
            <div class="flex items-center gap-2 bg-white/10 backdrop-blur-sm border border-white/20 rounded-full px-3 py-1.5">
                <div class="w-1.5 h-1.5 rounded-full bg-blush animate-pulse"></div>
                <span class="text-petal/85 text-[11px] font-sans font-light tracking-widest uppercase">with Dillish</span>
            </div>
        </div>

        <div id="bottom-content" class="absolute bottom-0 left-0 right-0 z-20 px-6 pb-10">

            <div id="headline-block" class="mb-8">
                <p class="text-blush/90 text-xs font-sans font-light tracking-[0.25em] uppercase mb-3">Your wellness journey</p>
                <h1 class="font-serif text-petal font-light leading-[1.12] mb-4" style="font-size: 42px;">
                    Bloom into<br />
                    <em class="font-light italic" style="color: #F4C5B8;">your best</em><br />
                    self
                </h1>
                <p class="text-petal/60 text-sm font-sans font-light leading-relaxed max-w-[280px]">
                    Personalized workouts, nutrition tracking, and wellness guidance — crafted for women who strive.
                </p>
            </div>

            <div id="cta-section" class="flex flex-col gap-3">
                <button id="get-started-btn" class="w-full min-h-[54px] rounded-2xl flex items-center justify-center gap-3 font-sans font-medium tracking-wide text-[15px] transition-all active:scale-95" style="background: linear-gradient(135deg, #F4C5B8 0%, #E8A898 100%); color: #3A2820;">
                    <span>Get Started</span>
                    <i class="fa-solid fa-arrow-right text-sm" style="color: #3A2820cc;"></i>
                </button>

                <button id="signin-btn" class="w-full min-h-[50px] rounded-2xl border border-petal/20 flex items-center justify-center gap-2 font-sans font-light text-petal/75 text-[14px] tracking-wide transition-all active:scale-95 bg-white/5 backdrop-blur-sm">
                    Already a member? <span class="font-medium" style="color: #F4C5B8;">Sign in</span>
                </button>
            </div>

            <div id="trust-badges" class="flex items-center justify-center gap-6 mt-6">
                <div class="flex items-center gap-1.5">
                    <i class="fa-solid fa-shield-halved text-[11px]" style="color: #F4C5B8aa;"></i>
                    <span class="text-petal/40 text-[11px] font-light">Private & Secure</span>
                </div>
                <div class="w-px h-3 bg-petal/20"></div>
                <div class="flex items-center gap-1.5">
                    <i class="fa-solid fa-star text-[11px]" style="color: #F4C5B8aa;"></i>
                    <span class="text-petal/40 text-[11px] font-light">4.9 Rating</span>
                </div>
                <div class="w-px h-3 bg-petal/20"></div>
                <div class="flex items-center gap-1.5">
                    <i class="fa-solid fa-users text-[11px]" style="color: #F4C5B8aa;"></i>
                    <span class="text-petal/40 text-[11px] font-light">50K+ Women</span>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
