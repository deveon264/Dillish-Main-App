<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script> window.FontAwesomeConfig = { autoReplaceSvg: 'nest'};</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { display: none; }
        * { -webkit-tap-highlight-color: transparent; }
        .cta-btn:active { transform: scale(0.97); }
        .unit-tab { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .unit-tab.active { background: rgba(201,137,122,0.85); color: #2C2422; }
        .activity-card { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .activity-card:active { transform: scale(0.97); }
        .activity-card.selected { border-color: rgba(201,137,122,0.75); background: rgba(201,137,122,0.13); }
        .activity-card.selected .card-check { opacity: 1; transform: scale(1); }
        .card-check { opacity: 0; transform: scale(0.7); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .body-pref-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .body-pref-btn.selected { border-color: rgba(201,137,122,0.75); background: rgba(201,137,122,0.13); }
        .body-pref-btn:active { transform: scale(0.97); }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .field-input { background: rgba(247,235,232,0.06); border: 1px solid rgba(247,235,232,0.12); color: #F7EBE8; }
        .field-input:focus { outline: none; border-color: rgba(201,137,122,0.6); background: rgba(201,137,122,0.08); }
        .field-input::placeholder { color: rgba(247,235,232,0.3); }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'serif'],
                        sans: ['DM Sans', 'sans-serif'],
                    },
                    colors: {
                        blush: '#F2D4CC',
                        rose: '#C9897A',
                        petal: '#F7EBE8',
                        mauve: '#9B6E6A',
                        cream: '#FAF6F3',
                        charcoal: '#2C2422',
                        mist: '#E8DDD9',
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-charcoal font-sans flex justify-center items-start min-h-screen">

    <div id="profile-screen" class="relative w-full max-w-[375px] mx-auto overflow-hidden flex flex-col" style="height: 840px; background: linear-gradient(160deg, #2C2422 0%, #1e1614 60%, #2C2422 100%);">

        <div class="absolute inset-0 pointer-events-none" style="background: radial-gradient(ellipse at 80% 10%, rgba(242,212,204,0.07) 0%, transparent 55%), radial-gradient(ellipse at 10% 90%, rgba(201,137,122,0.05) 0%, transparent 50%);"></div>

        <div id="top-bar" class="relative z-20 flex items-center justify-between px-6 pt-12 pb-3">
            <div id="logo-mark" class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-full border border-blush/60 flex items-center justify-center">
                    <i class="fa-solid fa-leaf text-blush text-[10px]"></i>
                </div>
                <span class="font-serif text-petal text-lg font-light tracking-[0.12em]">florish</span>
            </div>
            <button id="skip-btn" class="text-petal/50 text-sm font-sans font-light tracking-widest uppercase py-2 px-1 min-h-[44px] flex items-center">
                Skip
            </button>
        </div>

        <div id="progress-indicator" class="relative z-20 flex items-center justify-center gap-[6px] px-6 mb-5">
            <div class="h-[2px] flex-1 rounded-full bg-petal/30"></div>
            <div class="h-[2px] flex-1 rounded-full bg-petal/30"></div>
            <div class="h-[2px] flex-1 rounded-full bg-petal/30"></div>
            <div class="h-[2px] flex-1 rounded-full bg-petal/90"></div>
            <div class="h-[2px] flex-1 rounded-full bg-petal/25"></div>
            <div class="h-[2px] flex-1 rounded-full bg-petal/25"></div>
        </div>

        <div id="main-content" class="relative z-10 flex flex-col flex-1 px-6 overflow-y-auto pb-2">

            <div id="header-block" class="mb-5">
                <p class="text-blush/70 text-[11px] font-sans font-light tracking-[0.28em] uppercase mb-2">Step 4 of 6</p>
                <h2 class="font-serif text-petal font-light leading-tight mb-1.5" style="font-size: 30px;">
                    Tell us about<br/><em class="italic text-blush font-light">your body</em>
                </h2>
                <p class="text-petal/45 text-[13px] font-sans font-light leading-relaxed">Help us personalise your plan with a few details.</p>
            </div>

            <div id="form-fields" class="flex flex-col gap-4">

                <div id="age-field" class="flex flex-col gap-1.5">
                    <label class="text-petal/60 text-[11px] font-sans font-light tracking-[0.22em] uppercase">Age</label>
                    <div class="relative">
                        <input id="age-input" type="number" placeholder="25" min="13" max="99" class="field-input w-full h-[52px] rounded-2xl px-4 pr-14 text-[15px] font-sans font-light" />
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-petal/30 text-[13px] font-sans font-light">yrs</span>
                    </div>
                </div>

                <div id="weight-field" class="flex flex-col gap-1.5">
                    <div class="flex items-center justify-between">
                        <label class="text-petal/60 text-[11px] font-sans font-light tracking-[0.22em] uppercase">Weight</label>
                        <div id="weight-unit-toggle" class="flex rounded-xl overflow-hidden" style="background: rgba(247,235,232,0.07); border: 1px solid rgba(247,235,232,0.1);">
                            <button id="weight-kg" class="unit-tab active text-[11px] font-sans font-medium px-3 py-1.5 min-h-[32px] min-w-[44px] tracking-wide" onclick="setWeightUnit('kg', this)">kg</button>
                            <button id="weight-lbs" class="unit-tab text-petal/45 text-[11px] font-sans font-medium px-3 py-1.5 min-h-[32px] min-w-[44px] tracking-wide" onclick="setWeightUnit('lbs', this)">lbs</button>
                        </div>
                    </div>
                    <div class="relative">
                        <input id="weight-input" type="number" placeholder="62" class="field-input w-full h-[52px] rounded-2xl px-4 pr-14 text-[15px] font-sans font-light" />
                        <span id="weight-unit-label" class="absolute right-4 top-1/2 -translate-y-1/2 text-petal/30 text-[13px] font-sans font-light">kg</span>
                    </div>
                </div>

                <div id="height-field" class="flex flex-col gap-1.5">
                    <div class="flex items-center justify-between">
                        <label class="text-petal/60 text-[11px] font-sans font-light tracking-[0.22em] uppercase">Height</label>
                        <div id="height-unit-toggle" class="flex rounded-xl overflow-hidden" style="background: rgba(247,235,232,0.07); border: 1px solid rgba(247,235,232,0.1);">
                            <button id="height-cm" class="unit-tab active text-[11px] font-sans font-medium px-3 py-1.5 min-h-[32px] min-w-[44px] tracking-wide" onclick="setHeightUnit('cm', this)">cm</button>
                            <button id="height-ft" class="unit-tab text-petal/45 text-[11px] font-sans font-medium px-3 py-1.5 min-h-[32px] min-w-[44px] tracking-wide" onclick="setHeightUnit('ft', this)">ft</button>
                        </div>
                    </div>
                    <div class="relative flex gap-2" id="height-cm-input-wrap">
                        <div class="relative flex-1">
                            <input id="height-input" type="number" placeholder="165" class="field-input w-full h-[52px] rounded-2xl px-4 pr-12 text-[15px] font-sans font-light" />
                            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-petal/30 text-[13px] font-sans font-light">cm</span>
                        </div>
                    </div>
                    <div class="relative gap-2 hidden" id="height-ft-input-wrap">
                        <div class="flex gap-2">
                            <div class="relative flex-1">
                                <input id="height-ft-input" type="number" placeholder="5" class="field-input w-full h-[52px] rounded-2xl px-4 pr-10 text-[15px] font-sans font-light" />
                                <span class="absolute right-4 top-1/2 -translate-y-1/2 text-petal/30 text-[13px] font-sans font-light">ft</span>
                            </div>
                            <div class="relative flex-1">
                                <input id="height-in-input" type="number" placeholder="5" class="field-input w-full h-[52px] rounded-2xl px-4 pr-10 text-[15px] font-sans font-light" />
                                <span class="absolute right-4 top-1/2 -translate-y-1/2 text-petal/30 text-[13px] font-sans font-light">in</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="activity-field" class="flex flex-col gap-2">
                    <label class="text-petal/60 text-[11px] font-sans font-light tracking-[0.22em] uppercase">Activity Level</label>
                    <div class="flex flex-col gap-2" id="activity-options">

                        <button class="activity-card w-full min-h-[56px] rounded-2xl border border-petal/12 flex items-center gap-3.5 px-4 text-left" style="background: rgba(247,235,232,0.05);" onclick="selectActivity(this)">
                            <div class="w-9 h-9 min-w-[36px] rounded-xl flex items-center justify-center" style="background: rgba(247,235,232,0.07);">
                                <i class="fa-solid fa-couch text-blush text-[13px]"></i>
                            </div>
                            <div class="flex flex-col flex-1">
                                <span class="text-petal text-[14px] font-sans font-medium leading-snug">Sedentary</span>
                                <span class="text-petal/35 text-[11px] font-sans font-light leading-snug">Little or no exercise</span>
                            </div>
                            <div class="card-check w-5 h-5 rounded-full flex items-center justify-center" style="background: rgba(201,137,122,0.85);">
                                <i class="fa-solid fa-check text-charcoal text-[9px]"></i>
                            </div>
                        </button>

                        <button class="activity-card w-full min-h-[56px] rounded-2xl border border-petal/12 flex items-center gap-3.5 px-4 text-left" style="background: rgba(247,235,232,0.05);" onclick="selectActivity(this)">
                            <div class="w-9 h-9 min-w-[36px] rounded-xl flex items-center justify-center" style="background: rgba(247,235,232,0.07);">
                                <i class="fa-solid fa-person-walking text-blush text-[13px]"></i>
                            </div>
                            <div class="flex flex-col flex-1">
                                <span class="text-petal text-[14px] font-sans font-medium leading-snug">Lightly Active</span>
                                <span class="text-petal/35 text-[11px] font-sans font-light leading-snug">1–3 days/week</span>
                            </div>
                            <div class="card-check w-5 h-5 rounded-full flex items-center justify-center" style="background: rgba(201,137,122,0.85);">
                                <i class="fa-solid fa-check text-charcoal text-[9px]"></i>
                            </div>
                        </button>

                        <button class="activity-card w-full min-h-[56px] rounded-2xl border border-petal/12 flex items-center gap-3.5 px-4 text-left" style="background: rgba(247,235,232,0.05);" onclick="selectActivity(this)">
                            <div class="w-9 h-9 min-w-[36px] rounded-xl flex items-center justify-center" style="background: rgba(247,235,232,0.07);">
                                <i class="fa-solid fa-person-running text-blush text-[13px]"></i>
                            </div>
                            <div class="flex flex-col flex-1">
                                <span class="text-petal text-[14px] font-sans font-medium leading-snug">Moderately Active</span>
                                <span class="text-petal/35 text-[11px] font-sans font-light leading-snug">3–5 days/week</span>
                            </div>
                            <div class="card-check w-5 h-5 rounded-full flex items-center justify-center" style="background: rgba(201,137,122,0.85);">
                                <i class="fa-solid fa-check text-charcoal text-[9px]"></i>
                            </div>
                        </button>

                        <button class="activity-card w-full min-h-[56px] rounded-2xl border border-petal/12 flex items-center gap-3.5 px-4 text-left" style="background: rgba(247,235,232,0.05);" onclick="selectActivity(this)">
                            <div class="w-9 h-9 min-w-[36px] rounded-xl flex items-center justify-center" style="background: rgba(247,235,232,0.07);">
                                <i class="fa-solid fa-bolt text-blush text-[13px]"></i>
                            </div>
                            <div class="flex flex-col flex-1">
                                <span class="text-petal text-[14px] font-sans font-medium leading-snug">Very Active</span>
                                <span class="text-petal/35 text-[11px] font-sans font-light leading-snug">6–7 days/week</span>
                            </div>
                            <div class="card-check w-5 h-5 rounded-full flex items-center justify-center" style="background: rgba(201,137,122,0.85);">
                                <i class="fa-solid fa-check text-charcoal text-[9px]"></i>
                            </div>
                        </button>

                    </div>
                </div>

                <div id="body-pref-field" class="flex flex-col gap-2 mb-2">
                    <label class="text-petal/60 text-[11px] font-sans font-light tracking-[0.22em] uppercase">Body Preference</label>
                    <div class="flex gap-2">
                        <button class="body-pref-btn flex-1 min-h-[52px] rounded-2xl border border-petal/12 flex flex-col items-center justify-center gap-1 px-2" style="background: rgba(247,235,232,0.05);" onclick="selectBodyPref(this)">
                            <i class="fa-solid fa-person text-blush text-base"></i>
                            <span class="text-petal text-[12px] font-sans font-medium leading-snug">Slim</span>
                        </button>
                        <button class="body-pref-btn flex-1 min-h-[52px] rounded-2xl border border-petal/12 flex flex-col items-center justify-center gap-1 px-2" style="background: rgba(247,235,232,0.05);" onclick="selectBodyPref(this)">
                            <i class="fa-solid fa-person-dress text-blush text-base"></i>
                            <span class="text-petal text-[12px] font-sans font-medium leading-snug">Toned</span>
                        </button>
                        <button class="body-pref-btn flex-1 min-h-[52px] rounded-2xl border border-petal/12 flex flex-col items-center justify-center gap-1 px-2" style="background: rgba(247,235,232,0.05);" onclick="selectBodyPref(this)">
                            <i class="fa-solid fa-dumbbell text-blush text-base"></i>
                            <span class="text-petal text-[12px] font-sans font-medium leading-snug">Athletic</span>
                        </button>
                        <button class="body-pref-btn flex-1 min-h-[52px] rounded-2xl border border-petal/12 flex flex-col items-center justify-center gap-1 px-2" style="background: rgba(247,235,232,0.05);" onclick="selectBodyPref(this)">
                            <i class="fa-solid fa-heart text-blush text-base"></i>
                            <span class="text-petal text-[12px] font-sans font-medium leading-snug">Curvy</span>
                        </button>
                    </div>
                </div>

            </div>

        </div>

        <div id="bottom-actions" class="relative z-20 px-6 pb-10 pt-3" style="background: linear-gradient(to top, #1e1614 70%, transparent 100%);">
            <div class="flex items-center gap-3">
                <button id="back-btn" class="min-w-[54px] min-h-[54px] rounded-2xl border border-petal/15 bg-white/5 flex items-center justify-center transition-all active:scale-95">
                    <i class="fa-solid fa-arrow-left text-petal/60 text-sm"></i>
                </button>
                <button id="next-btn" class="cta-btn flex-1 min-h-[54px] rounded-2xl flex items-center justify-center gap-3 font-sans font-medium tracking-wide text-charcoal text-[15px] transition-all" style="background: linear-gradient(135deg, #F2D4CC 0%, #C9897A 100%);">
                    <span>Continue</span>
                    <i class="fa-solid fa-arrow-right text-charcoal/80 text-sm"></i>
                </button>
            </div>
        </div>

    </div>

    <script>
        let selectedActivity = null;
        let selectedBodyPref = null;
        let weightUnit = 'kg';
        let heightUnit = 'cm';

        function setWeightUnit(unit, btn) {
            weightUnit = unit;
            document.getElementById('weight-unit-label').textContent = unit;
            const allBtns = document.querySelectorAll('#weight-unit-toggle .unit-tab');
            allBtns.forEach(b => {
                b.classList.remove('active');
                b.classList.add('text-petal/45');
            });
            btn.classList.add('active');
            btn.classList.remove('text-petal/45');
        }

        function setHeightUnit(unit, btn) {
            heightUnit = unit;
            const allBtns = document.querySelectorAll('#height-unit-toggle .unit-tab');
            allBtns.forEach(b => {
                b.classList.remove('active');
                b.classList.add('text-petal/45');
            });
            btn.classList.add('active');
            btn.classList.remove('text-petal/45');

            if (unit === 'cm') {
                document.getElementById('height-cm-input-wrap').classList.remove('hidden');
                document.getElementById('height-ft-input-wrap').classList.add('hidden');
            } else {
                document.getElementById('height-cm-input-wrap').classList.add('hidden');
                document.getElementById('height-ft-input-wrap').classList.remove('hidden');
            }
        }

        function selectActivity(card) {
            const allCards = document.querySelectorAll('#activity-options .activity-card');
            allCards.forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedActivity = card;
        }

        function selectBodyPref(btn) {
            const allBtns = document.querySelectorAll('.body-pref-btn');
            allBtns.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedBodyPref = btn;
        }
    </script>

</body>
</html>
